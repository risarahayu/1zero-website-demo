name: Deploy Dist to Dewaweb Shared Hosting

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    name: 🏗️ Build & 🚀 Deploy
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Get the latest code from the repository
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # Step 2: Set up Node.js on the GitHub Actions runner
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    # Step 3: Install dependencies and build the project
    - name: 🛠️ Install and Build Project
      run: |
        npm ci
        npm run build

    # Step 4: Upload ONLY the dist folder to Dewaweb FTP
    - name: 📂 Sync Dist Folder to Hosting
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21 
        # IMPORTANT: Point to your build's dist folder
        local-dir: ./dist/
        # Optional: If you need to deploy to a specific subfolder, specify it in server-dir. 
        # If your FTP account already points to public_html, leave it blank or use './'
        server-dir: ./